<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Weather Application</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Main Style -->
    <link rel="stylesheet" href="style1.css">
</head>

<body class="weather-default">
    <main class="container">
        <div class="weather-card">
            <div class="search-box">
                <input type="text" id="city-input" placeholder="Enter city name..." autocomplete="off">
                <button id="search-btn" aria-label="Search City">
                    <i class="fas fa-search"></i>
                </button>
            </div>

            <div class="alert-message" id="error-message">
                City not found. Please try again.
            </div>

            <div class="loading-state" id="loading-spinner">
                <div class="spinner"></div>
            </div>

            <div class="weather-content" id="weather-display" style="display: none;">
                <div class="weather-header">
                    <h2 id="city-name">--</h2>
                    <p id="date-display">--</p>
                </div>

                <div class="weather-main">
                    <img src="" alt="Weather Icon" id="weather-icon">
                    <div class="temp-box">
                        <h1 id="temperature">--</h1>
                        <span class="unit">°C</span>
                    </div>
                    <h3 id="weather-condition">--</h3>
                </div>

                <div class="weather-details">
                    <div class="detail-card">
                        <i class="fas fa-tint"></i>
                        <div class="detail-info">
                            <span class="detail-value" id="humidity">--%</span>
                            <span class="detail-label">Humidity</span>
                        </div>
                    </div>
                    <div class="detail-card">
                        <i class="fas fa-wind"></i>
                        <div class="detail-info">
                            <span class="detail-value" id="wind-speed">-- km/h</span>
                            <span class="detail-label">Wind Speed</span>
                        </div>
                    </div>
                </div>
            </div>

            <div class="api-key-notice" id="api-key-notice" style="display: none;">
                <p><i class="fas fa-info-circle"></i> Please add your OpenWeather API key in <strong>script.js</strong>
                    to see live data.</p>
            </div>
        </div>
    </main>

    <script src="script.js"></script>
</body>

</html>
