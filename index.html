<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Real-time weather app — search any city, view current conditions, humidity, wind, and a 5-day forecast. Built with OpenWeatherMap API." />
  <title>WeatherNow — Real-Time Weather Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>

<body class="weather-default">
  <!-- ===== HEADER ===== -->
  <header class="app-header">
    <div class="logo">
      <span class="logo-icon">🌤️</span>
      <span class="logo-text">WeatherNow</span>
    </div>
    <button id="btn-geolocation" class="geo-btn" title="Use my location">
      <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10" />
        <circle cx="12" cy="12" r="3" />
        <line x1="12" y1="2" x2="12" y2="5" />
        <line x1="12" y1="19" x2="12" y2="22" />
        <line x1="2" y1="12" x2="5" y2="12" />
        <line x1="19" y1="12" x2="22" y2="12" />
      </svg>
      <span>Use My Location</span>
    </button>
  </header>

  <!-- ===== MAIN CONTENT ===== -->
  <main class="app-main">
    <!-- Search Section -->
    <section class="search-section" aria-label="City search">
      <div class="search-container">
        <div class="search-input-wrapper">
          <svg class="search-icon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24"
            fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8" />
            <line x1="21" y1="21" x2="16.65" y2="16.65" />
          </svg>
          <input type="text" id="city-input" class="search-input" placeholder="Search for a city…" autocomplete="off"
            aria-label="Enter city name" />
          <button id="btn-clear" class="clear-btn" title="Clear" aria-label="Clear search" hidden>✕</button>
        </div>
        <button id="btn-search" class="search-btn" aria-label="Search weather">
          <span>Search</span>
        </button>
      </div>
    </section>

    <!-- Error Banner -->
    <div id="error-banner" class="error-banner" role="alert" hidden>
      <span class="error-icon">⚠️</span>
      <span id="error-message">City not found. Please try again.</span>
    </div>

    <!-- Loading Spinner -->
    <div id="loading-spinner" class="loading-spinner" aria-live="polite" hidden>
      <div class="spinner-ring"></div>
      <p>Fetching weather data…</p>
    </div>

    <!-- ===== WEATHER CARD ===== -->
    <section id="weather-card" class="weather-card" hidden aria-label="Current weather">
      <!-- Location & Date -->
      <div class="card-header">
        <div class="location-info">
          <h1 id="city-name" class="city-name">—</h1>
          <p id="country-code" class="country-code">—</p>
        </div>
        <p id="current-date" class="current-date">—</p>
      </div>

      <!-- Main Temp & Condition -->
      <div class="card-body">
        <div class="temp-block">
          <div id="weather-icon" class="weather-icon" aria-label="Weather condition icon"></div>
          <div class="temp-info">
            <span id="temperature" class="temperature">—</span>
            <span class="temp-unit">°C</span>
          </div>
        </div>
        <p id="weather-description" class="weather-description">—</p>
        <p id="feels-like" class="feels-like">Feels like —°C</p>
      </div>

      <!-- Stats Row -->
      <div class="stats-row">
        <div class="stat-item" id="stat-humidity">
          <div class="stat-icon">💧</div>
          <div class="stat-details">
            <span id="humidity" class="stat-value">—</span>
            <span class="stat-label">Humidity</span>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item" id="stat-wind">
          <div class="stat-icon">💨</div>
          <div class="stat-details">
            <span id="wind-speed" class="stat-value">—</span>
            <span class="stat-label">Wind</span>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item" id="stat-visibility">
          <div class="stat-icon">👁️</div>
          <div class="stat-details">
            <span id="visibility" class="stat-value">—</span>
            <span class="stat-label">Visibility</span>
          </div>
        </div>
        <div class="stat-divider"></div>
        <div class="stat-item" id="stat-pressure">
          <div class="stat-icon">🌡️</div>
          <div class="stat-details">
            <span id="pressure" class="stat-value">—</span>
            <span class="stat-label">Pressure</span>
          </div>
        </div>
      </div>

      <!-- Sunrise / Sunset -->
      <div class="sun-row">
        <div class="sun-item">
          <span class="sun-icon">🌅</span>
          <div>
            <p class="sun-label">Sunrise</p>
            <p id="sunrise" class="sun-time">—</p>
          </div>
        </div>
        <div class="sun-item">
          <span class="sun-icon">🌇</span>
          <div>
            <p class="sun-label">Sunset</p>
            <p id="sunset" class="sun-time">—</p>
          </div>
        </div>
      </div>
    </section>

    <!-- ===== 5-DAY FORECAST ===== -->
    <section id="forecast-section" class="forecast-section" hidden aria-label="5-day forecast">
      <h2 class="forecast-title">5-Day Forecast</h2>
      <div id="forecast-grid" class="forecast-grid"></div>
    </section>
  </main>

  <!-- ===== FOOTER ===== -->
  <footer class="app-footer">
    <p>Powered by <a href="https://openweathermap.org/" target="_blank" rel="noopener noreferrer">OpenWeatherMap</a>
      &nbsp;|&nbsp; WeatherNow © 2025</p>
  </footer>

  <script src="script.js"></script>
</body>

</html>
